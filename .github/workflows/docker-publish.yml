name: Docker Image CI/CD

on:
  push:
    branches: [ "main" ] # 当代码合并到 main 分支时触发
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: actions/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }} # 你需要在 GitHub Repo 的 Settings -> Secrets 中设置
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/rustfs-api:latest
          ${{ secrets.DOCKER_USERNAME }}/rustfs-api:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
